services:
  postgres:
    image: postgres:16
    container_name: transcendence_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcendence_network

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - transcendence_network

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcendence_network

volumes:
  postgres_data:

networks:
  transcendence_network:
    driver: bridge